name: Update README

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'  # hourly
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Helix stats
        id: stats
        run: |
          DATA=$(curl -sf https://helix.millyweb.com/api/v1/master/status || echo '{}')
          echo "chunks=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('chunks',0))" 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "containers=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('containers',0))" 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "sessions=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['counts'].get('sessions',0))" 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "decisions=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['counts'].get('decisions',0))" 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "entities=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['counts'].get('entities',0))" 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "kb=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['counts'].get('kb_documents',0))" 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
          echo "updated=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Regenerate README
        run: |
          cat > README.md << EOF
# ⚡ Helix Cortex

> Personal AI intelligence platform — context capture, compression, knowledge graph, and MCP tooling.

[![Push](https://github.com/rdmilly/helix/actions/workflows/readme.yml/badge.svg)](https://github.com/rdmilly/helix/actions)
![Containers](https://img.shields.io/badge/containers-${{ steps.stats.outputs.containers }}-blue?style=flat-square)
![Chunks](https://img.shields.io/badge/chunks-${{ steps.stats.outputs.chunks }}-purple?style=flat-square)
![Sessions](https://img.shields.io/badge/sessions-${{ steps.stats.outputs.sessions }}-green?style=flat-square)

**[🌐 Live Dashboard →](https://helixmaster.millyweb.com)**

---

## What is Helix?

Helix is a self-hosted AI intelligence layer built on top of LLMs. It captures every session, extracts decisions and entities, compresses context, and makes everything searchable — so Claude always knows what you've built, decided, and why.

## Architecture

\`\`\`
Claude → mcp-front → provision-filter → mcp-provisioner → helix-mcp → cortex
                                                                           ↓
                                                              Postgres · ChromaDB · MinIO
                                                              KG · KB · Scheduler · Observer
\`\`\`

## Live Stats

| Metric | Count |
|--------|-------|
| 🧠 Conversation chunks | ${{ steps.stats.outputs.chunks }} |
| 🐳 Containers running | ${{ steps.stats.outputs.containers }} |
| 💬 Sessions indexed | ${{ steps.stats.outputs.sessions }} |
| 🎯 Decisions recorded | ${{ steps.stats.outputs.decisions }} |
| 🔗 KG entities | ${{ steps.stats.outputs.entities }} |
| 📄 KB documents | ${{ steps.stats.outputs.kb }} |

## Roadmap

| Phase | Status | Description |
|-------|--------|-------------|
| P1 Foundation | ✅ Complete | Cortex, Postgres, ChromaDB, event bus |
| P2 Ingestion | ✅ Complete | Conversation ingester, FTS5 indexing |
| P3 Intelligence | ✅ Complete | Haiku reconciler, KG chain, journal |
| P4 Gates | ✅ Complete | Session state, assembler, cortex_act |
| P5 Assembler | ✅ Complete | Spec gen, prestage, scaffold |
| P6 GitHub OAuth | 🔨 Building | Repo connect, auto-scanner |

## Key Services

- **helix-cortex** — FastAPI backend, REST + MCP tools (port 9050)
- **helix-mcp** — Single MCP surface for Claude (port 9096)
- **Scheduler** — 7 background jobs (compression, patterns, backup, reconciler, ingester)
- **Intelligence Chain** — Haiku extracts decisions → KG → journal → ADRs
- **Assembler** — Prestage candidates, spec generation, scaffold suggestions

## Related Projects

- [MemBrain](https://github.com/rdmilly/membrain) — Browser extension for AI conversation capture
- [helixmaster.millyweb.com](https://helixmaster.millyweb.com) — Live build dashboard

---

*README auto-generated by GitHub Actions — last updated ${{ steps.stats.outputs.updated }}*
EOF

      - name: Commit README
        run: |
          git config user.name 'Helix Bot'
          git config user.email 'helix@millyweb.com'
          git add README.md
          git diff --staged --quiet || git commit -m 'docs: auto-update README with live stats'
          git push
