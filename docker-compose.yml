services:
  helix-cortex:
    build: .
    container_name: helix-cortex
    restart: unless-stopped
    ports:
      - "9050:9050"
    volumes:
      - /opt/data/helix:/app/data
      - /opt/projects:/opt/projects
      # single-FILE mounts (2026-07-21): directory mounts drag in the host
      # __pycache__ (stale .pyc from March) and break imports. File mounts
      # deploy fixes without shadowing the image's compiled cache.
      - ./routers/ext_ingest.py:/app/routers/ext_ingest.py:ro
      - ./services/pg_sync.py:/app/services/pg_sync.py:ro
      - ./services/reconciler.py:/app/services/reconciler.py:ro
      - ./services/haiku.py:/app/services/haiku.py:ro
      - ./services/exchange.py:/app/services/exchange.py:ro
    env_file:
      - .env
      - ./secrets/helix.env
    environment:
      # embeddings moved to the controller card on VPS2; the old helix-embeddings
      # container no longer exists and .env still points at it (2026-07-21)
      EMBEDDINGS_URL: http://100.64.0.1:9060
      # 0 = skip Haiku summaries/intelligence during the bulk backfill (~$141 saved
      # on 2108 conversations). Raw storage, chunking and embeddings still run.
      # Flip back to 1 after the Claude-authored summary pipeline lands.
      HELIX_LLM_ENRICH: "0"
    networks:
      - apps
      - data
      - mcp
    depends_on:
      helix-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9050/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  helix-infisical-agent:
    image: infisical/cli:latest
    container_name: helix-infisical-agent
    restart: unless-stopped
    entrypoint:
    - /bin/sh
    - /config/infisical-entrypoint.sh
    volumes:
    - ./infisical-entrypoint.sh:/config/infisical-entrypoint.sh:ro
    - ./secrets:/secrets
    networks:
    - apps
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - test -s /secrets/helix.env && grep -q ANTHROPIC_API_KEY /secrets/helix.env
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M
  helix-postgres:
    image: pgvector/pgvector:pg16
    container_name: helix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: helix
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
    - /opt/data/helix/postgres-data:/var/lib/postgresql/data
    ports:
    - 9037:5432
    networks:
    - data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U helix
      interval: 10s
      timeout: 5s
      retries: 5
  helix-neo4j:
    image: neo4j:5.18-community
    container_name: helix-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
    - ./neo4j-data:/data
    ports:
    - 9038:7474
    - 9039:7687
    networks:
    - data
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://localhost:7474 || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
  helix-redis:
    image: redis:7-alpine
    container_name: helix-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
    - data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 3s
      retries: 3
  helix-chromadb:
    image: chromadb/chroma:0.5.23
    container_name: helix-chromadb
    restart: unless-stopped
    volumes:
    - ./chromadb-data:/chroma/chroma
    environment:
    - ANONYMIZED_TELEMETRY=False
    networks:
    - data
    healthcheck:
      test:
      - CMD
      - bash
      - -c
      - exec 3<>/dev/tcp/localhost/8000
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
  helix-garage:
    image: dxflrs/garage:v1.0.1
    container_name: helix-garage
    restart: unless-stopped
    environment:
    - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    volumes:
    - /opt/projects/the-forge/garage.toml:/etc/garage.toml:ro
    - garage-data:/var/lib/garage/data
    - garage-meta:/var/lib/garage/meta
    networks:
    - apps
    healthcheck:
      test:
      - CMD
      - /garage
      - -c
      - /etc/garage.toml
      - status
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
  the-forge:
    build: /opt/projects/the-forge
    container_name: the-forge
    restart: unless-stopped
    ports:
    - 9095:9095
    environment:
    - PORT=9095
    - DATA_DIR=/app/data
    - WORKSPACE_ROOT=/workspace
    - STORAGE_ENDPOINT=helix-garage:3900
    - STORAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
    - STORAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
    - STORAGE_BUCKET=workspace
    - STORAGE_SECURE=false
    - HELIX_URL=http://helix-cortex:9050
    volumes:
    - forge-data:/app/data
    - forge-workspace:/workspace
    - /opt/projects:/projects:rw
    networks:
    - apps
    - mcp
    depends_on:
      helix-garage:
        condition: service_healthy
      helix-cortex:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9095/health')
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
    - traefik.enable=true
    - traefik.docker.network=apps
    - traefik.http.routers.forge.rule=Host(`forge.millyweb.com`)
    - traefik.http.routers.forge.entrypoints=https
    - traefik.http.routers.forge.tls.certresolver=letsencrypt
    - traefik.http.services.forge.loadbalancer.server.port=9095
  transcript-bridge:
    build: ./transcript-bridge
    container_name: transcript-bridge
    restart: unless-stopped
    ports:
    - 8097:8099
    environment:
      HELIX_URL: http://helix-cortex:9050
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-bridge-dev-key}
    volumes:
    - transcript-bridge-data:/app/data
    networks:
    - apps
    - edge
    depends_on:
      helix-cortex:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8099/')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
    - traefik.enable=true
    - traefik.docker.network=apps
    - traefik.http.routers.transcript-bridge.rule=Host(`bridge.millyweb.com`)
    - traefik.http.routers.transcript-bridge.entrypoints=https
    - traefik.http.routers.transcript-bridge.tls.certresolver=letsencrypt
    - traefik.http.services.transcript-bridge.loadbalancer.server.port=8099
  helix-mcp:
    build: ./mcp
    container_name: helix-mcp
    restart: unless-stopped
    environment:
    - HELIX_URL=http://helix-cortex:9050
    networks:
    - mcp
    depends_on:
      helix-cortex:
        condition: service_healthy
volumes:
  transcript-bridge-data: null
  forge-data: null
  forge-workspace: null
  garage-data: null
  garage-meta: null
networks:
  apps:
    external: true
  data:
    external: true
  mcp:
    external: true
  edge:
    external: true
